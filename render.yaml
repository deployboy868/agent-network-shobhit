# Render Blueprint — free tier (sleeps when idle; ~30s wake on first visit)
# https://render.com → New → Blueprint → connect GitHub repo
services:
  - type: web
    name: agent-network-demo
    runtime: docker
    dockerfilePath: ./Dockerfile.cloud
    plan: free
    healthCheckPath: /
    envVars:
      - key: AGENT_NETWORK_MODE
        value: mock
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /app
